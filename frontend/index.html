<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar - Gestión Restaurante</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <h1>🍽️ Gestión Restaurante</h1>
      <p class="subtitle">Ingresá con tu cuenta para continuar</p>
      <form id="login-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" required autocomplete="username" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submit-btn">
          Ingresar
        </button>
        <p class="small" style="color:#b5482f;margin-top:10px" id="error-msg"></p>
      </form>
      <div class="demo-users">
        <strong>Usuarios de demostración</strong> (contraseña: <code>restaurante123</code>)<br />
        admin@restaurante.test · duenio@restaurante.test · encargado@restaurante.test<br />
        cajero@restaurante.test · mozo@restaurante.test · cocina@restaurante.test
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Si ya hay sesión abierta, ir directo al salón.
    if (getToken() && getUser()) {
      location.href = "/pages/salon.html";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error-msg");
      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Ingresando...";
      try {
        const data = await api("/auth/login", { method: "POST", body: { email, password } });
        setSession(data.token, data.user);
        location.href = "/pages/salon.html";
      } catch (err) {
        errorEl.textContent = err.message || "No se pudo iniciar sesión.";
        btn.disabled = false;
        btn.textContent = "Ingresar";
      }
    });
  </script>
</body>
</html>
